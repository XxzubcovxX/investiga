

services:
 

  # Backend em Python
  api-investiga:
    build: ./backend-python
    container_name: investiga_api
    restart: always
    ports:
      - "4001:4000" # Mudamos para a 4000 para o Front não precisar de ajuste
    env_file: 
      - /home/zubgorka/investiga/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=host.docker.internal
    networks:
      - investiga_network

  # Frontend em React
  investiga-front:
    build: ./frontend-react
    container_name: investiga_web
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_API_URL=http://100.65.19.93:4000
    networks:
      - investiga_network

networks:
  investiga_network:
    driver: bridge